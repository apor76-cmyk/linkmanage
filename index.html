<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Manager with Photo Modal</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
:root{
 --bg:#f6f7fb; --card:#fff; --text:#111827; --sub:#6b7280;
 --border:#e5e7eb; --accent:#2563eb; --star:#f59e0b;
}
.dark{ --bg:#0f172a; --card:#1e293b; --text:#f1f5f9; --sub:#94a3b8; --border:#334155; --accent:#3b82f6; }
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:var(--bg);color:var(--text);}
header{padding:14px;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;}
header button{padding:6px 12px;border-radius:12px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;}
.dark header button:not(.primary){color:white;} /* 다크모드 버튼 글자 흰색 */
.primary{background:var(--accent);color:white;border:none;}
.container{max-width:1400px;margin:auto;padding:20px;}
.card{background:var(--card);padding:20px;border-radius:20px;border:1px solid var(--border);margin-bottom:20px;}
.category-bar{display:flex;gap:10px;flex-wrap:wrap;}
.category-btn{padding:8px 16px;border-radius:999px;}
.category-btn.active{background:var(--accent);color:white;border:none;}
.link-list{display:grid;gap:16px;margin-top:10px;grid-template-columns:repeat(3,1fr);}
@media(min-width:768px){.link-list{grid-template-columns:repeat(4,1fr);}}
@media(min-width:1200px){.link-list{grid-template-columns:repeat(6,1fr);}}
.link-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:.2s;position:relative;}
.link-card:hover{transform:translateY(-4px);box-shadow:0 8px 18px rgba(0,0,0,.1);}
.thumb{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:40px;}
.thumb img, .thumb video{width:100%;height:100%;object-fit:cover;}
.link-body{padding:10px;display:flex;flex-direction:column;gap:6px;}
.link-title{font-size:13px;font-weight:600;}
.star{cursor:pointer;font-size:18px;color:var(--sub);}
.star.active{color:var(--star);}
.manage-actions{display:flex;gap:6px;margin-top:6px;}
.sortable-ghost{opacity:.4;}
input,select,textarea{padding:8px 12px;border-radius:10px;border:1px solid var(--border);}
textarea{width:100%;}
#photoModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:9999;}
#photoModal img{max-width:90%;max-height:90%;border-radius:12px;}
</style>
</head>
<body>

<header id="topHeader">
<button class="primary" onclick="addCategory()">+카테고리</button>
<button onclick="toggleManage()">관리모드</button>
<button onclick="toggleUI()">기능숨김</button>
<button onclick="toggleDark()">다크모드</button>
<button onclick="downloadBackup()">백업</button>
<button onclick="restoreBackup()">복원</button>
<button onclick="syncFromGit()">⬇동기화</button>
<button onclick="syncToGit()">⬆업로드</button>
<input id="searchInput" placeholder="검색..." oninput="renderLinks()">
</header>

<div class="container">
<div class="card" id="inputCard">
<select id="typeSelect">
<option value="youtube">유튜브</option>
<option value="link">링크</option>
<option value="photo">사진</option>
<option value="text">텍스트</option>
</select>
<input id="titleInput" placeholder="제목">
<input id="urlInput" placeholder="URL (유튜브/링크만)">
<input type="file" id="fileInput" accept="image/*" multiple>
<textarea id="textInput" placeholder="텍스트"></textarea>
<button class="primary" onclick="addLink()">저장</button>
</div>

<div class="card"><div id="categoryBar" class="category-bar"></div></div>
<div class="card"><div id="linkList" class="link-list"></div></div>
</div>

<div id="photoModal" onclick="this.style.display='none'">
  <img id="modalImg" src="">
</div>

<script>
const GITHUB={user:"apor76-cmyk",repo:"data",dataPath:"linkmanager.json",uploadPath:"uploads/"};
let data={Home:[]},currentCategory="Home",manageMode=false,linkSortable,uiHidden=false;

function saveLocal(){localStorage.setItem("lmData",JSON.stringify(data));}
function loadLocal(){const s=localStorage.getItem("lmData"); if(s){data=JSON.parse(s); currentCategory=Object.keys(data)[0];}}
function toggleDark(){document.body.classList.toggle("dark");}
function toggleUI(){
  uiHidden=!uiHidden;
  const header=document.getElementById("topHeader");
  const input=document.getElementById("inputCard");
  if(uiHidden){
    header.style.display="none"; input.style.display="none";
    if(linkSortable) linkSortable.option("disabled",true);
    const btn=document.createElement("button"); btn.id="restoreBtn"; btn.textContent="기능보기"; btn.style.position="fixed"; btn.style.top="20px"; btn.style.right="20px"; btn.style.zIndex="9999"; btn.onclick=toggleUI; document.body.appendChild(btn);
  } else {
    header.style.display="flex"; input.style.display="block";
    if(linkSortable) linkSortable.option("disabled",false);
    const btn=document.getElementById("restoreBtn"); if(btn) btn.remove();
  }
}
function getYoutubeId(url){if(url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0]; if(url.includes("v=")) return url.split("v=")[1].split("&")[0]; return "";}

function addCategory(){const name=prompt("카테고리 이름"); if(!name) return; if(!data[name]){data[name]=[]; currentCategory=name; saveLocal(); renderCategories(); renderLinks();}}

function renderCategories(){
  const bar=document.getElementById("categoryBar"); bar.innerHTML="";
  Object.keys(data).forEach(cat=>{
    const wrap=document.createElement("div");
    const btn=document.createElement("button"); btn.textContent=cat; btn.className="category-btn";
    if(cat===currentCategory) btn.classList.add("active");
    btn.onclick=()=>{currentCategory=cat; renderCategories(); renderLinks();};
    wrap.appendChild(btn);
    if(manageMode){
      const edit=document.createElement("button"); edit.textContent="✏";
      edit.onclick=()=>{ const n=prompt("새 이름",cat); if(n && !data[n]){data[n]=data[cat]; delete data[cat]; currentCategory=n; saveLocal(); renderCategories(); renderLinks();} };
      const del=document.createElement("button"); del.textContent="🗑";
      del.onclick=()=>{ if(confirm("삭제?")){delete data[cat]; currentCategory=Object.keys(data)[0]; saveLocal(); renderCategories(); renderLinks();} };
      wrap.appendChild(edit); wrap.appendChild(del);
    }
    bar.appendChild(wrap);
  });
}

function renderLinks(){
  const box=document.getElementById("linkList"); box.innerHTML="";
  if(!currentCategory) return;
  let list=[...data[currentCategory]];
  const search=document.getElementById("searchInput").value.toLowerCase();
  list=list.filter(i=>i.title.toLowerCase().includes(search));
  // 즐겨찾기 상단 정렬
  list.sort((a,b)=>a.favorite&&!b.favorite?-1:!a.favorite&&b.favorite?1:0);

  list.forEach(item=>{
    const card=document.createElement("div"); card.className="link-card"; card.dataset.id=item.id;
    let thumb="";
    if(item.type==="youtube"){const id=getYoutubeId(item.url); thumb=`<div class="thumb"><img src="https://img.youtube.com/vi/${id}/mqdefault.jpg"></div>`;}
    else if(item.type==="link"){thumb=`<div class="thumb">🌐</div>`;}
    else if(item.type==="photo"){thumb=`<div class="thumb"><img src="${item.preview}"></div>`;}
    else if(item.type==="text"){thumb=`<div class="thumb">📝</div>`;}
    card.innerHTML=`${thumb}<div class="link-body"><div class="link-title">${item.title}</div><div><span class="star ${item.favorite?'active':''}">★</span></div></div>`;

    card.onclick=()=>{ 
      if(item.type==="youtube"||item.type==="link") window.open(item.url);
      if(item.type==="photo" && item.preview){document.getElementById("modalImg").src=item.preview; document.getElementById("photoModal").style.display="flex";}
      if(item.type==="text") alert(item.text);
    };
    card.querySelector(".star").onclick=e=>{ e.stopPropagation(); item.favorite=!item.favorite; saveLocal(); renderLinks(); };

    if(manageMode){
      const actions=document.createElement("div"); actions.className="manage-actions";
      const edit=document.createElement("button"); edit.textContent="✏";
      edit.onclick=e=>{ e.stopPropagation(); const t=prompt("제목 수정",item.title); if(t){item.title=t; saveLocal(); renderLinks();} };
      const del=document.createElement("button"); del.textContent="🗑";
      del.onclick=e=>{ e.stopPropagation(); if(confirm("삭제?")){data[currentCategory]=data[currentCategory].filter(d=>d.id!==item.id); saveLocal(); renderLinks();} };
      actions.appendChild(edit); actions.appendChild(del); card.appendChild(actions);
    }
    box.appendChild(card);
  });

  if(linkSortable) linkSortable.destroy();
  linkSortable=new Sortable(box,{animation:200,ghostClass:"sortable-ghost",disabled:uiHidden});
}

function addLink(){
  if(!currentCategory) return alert("카테고리 선택");
  const type=typeSelect.value, title=titleInput.value; 
  if(!title) return alert("제목");

  if(type==="youtube"||type==="link"){data[currentCategory].push({id:Date.now(),title,url:urlInput.value,type,favorite:false});}
  else if(type==="text"){data[currentCategory].push({id:Date.now(),title,text:textInput.value,type,favorite:false});}
  else if(type==="photo"){
    const files=[...fileInput.files]; if(files.length===0){alert("사진 선택"); return;}
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=e=>{
        const preview=e.target.result;
        data[currentCategory].push({id:Date.now(),title,type,preview,favorite:false});
        saveLocal(); renderLinks();
      };
      reader.readAsDataURL(file);
    });
  }

  titleInput.value=""; urlInput.value=""; textInput.value=""; fileInput.value="";
  saveLocal(); renderLinks();
}

function toggleManage(){manageMode=!manageMode; renderCategories(); renderLinks();}
function downloadBackup(){const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="linkmanager_backup.json"; a.click();}
function restoreBackup(){const input=document.createElement("input"); input.type="file"; input.onchange=e=>{const reader=new FileReader(); reader.onload=x=>{data=JSON.parse(x.target.result); saveLocal(); renderCategories(); renderLinks();}; reader.readAsText(e.target.files[0]);}; input.click();}
function getToken(){let t=localStorage.getItem("ghToken"); if(!t){t=prompt("GitHub Token"); if(t) localStorage.setItem("ghToken",t);} return t;}
async function syncToGit(){const token=getToken(); if(!token) return; const url=`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${GITHUB.dataPath}`; let sha=null; const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}}); if(r.ok){const f=await r.json(); sha=f.sha;} await fetch(url,{method:"PUT",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({message:"update data",content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),sha})}); alert("업로드 완료");}
async function syncFromGit(){const token=getToken(); if(!token) return; const url=`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${GITHUB.dataPath}`; const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}}); if(!r.ok) return alert("파일 없음"); const f=await r.json(); data=JSON.parse(decodeURIComponent(escape(atob(f.content)))); saveLocal(); renderCategories(); renderLinks(); alert("동기화 완료");}

loadLocal(); renderCategories(); renderLinks();
</script>
</body>
</html>
