<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Manager</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<style>
:root{
 --bg:#f6f7fb;
 --card:#ffffff;
 --text:#111827;
 --sub:#6b7280;
 --border:#e5e7eb;
 --accent:#2563eb;
 --star:#f59e0b;
}
.dark{
 --bg:#0f172a;
 --card:#1e293b;
 --text:#f1f5f9;
 --sub:#94a3b8;
 --border:#334155;
 --accent:#3b82f6;
}

.dark button{
  color:#ffffff;
  border-color:#475569;
}

.dark .primary{
  color:#ffffff;
}

body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:var(--bg);color:var(--text);}
header{padding:16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;}
button{padding:6px 12px;border-radius:12px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;}
.primary{background:var(--accent);color:#fff;border:none;}
.container{max-width:1400px;margin:auto;padding:30px 20px;}
.card{background:var(--card);padding:20px;border-radius:20px;border:1px solid var(--border);margin-bottom:25px;}
.category-bar{display:flex;flex-wrap:wrap;gap:12px;}
.category-btn{padding:8px 16px;border-radius:999px;cursor:pointer;}
.category-btn.active{background:var(--accent);color:white;border:none;}
.link-list{display:grid;gap:16px;margin-top:10px;grid-template-columns:repeat(3,1fr);}
@media(min-width:768px){.link-list{grid-template-columns:repeat(4,1fr);}}
@media(min-width:1200px){.link-list{grid-template-columns:repeat(6,1fr);}}
.link-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;cursor:grab;transition:.25s;}
.link-card:hover{transform:translateY(-6px);box-shadow:0 10px 25px rgba(0,0,0,0.1);}
.thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:40px;}
.link-body{padding:12px;display:flex;flex-direction:column;gap:6px;}
.link-title{font-size:13px;font-weight:600;}
.star{cursor:pointer;font-size:18px;color:var(--sub);}
.star.active{color:var(--star);}
.manage-actions{display:flex;gap:6px;margin-top:6px;}
.sortable-ghost{opacity:.4;}
input,select,textarea{padding:10px 14px;border-radius:14px;border:1px solid var(--border);margin-right:8px;}
textarea{width:100%;margin-top:8px;}
</style>
</head>

<body>

<header id="topHeader">
<button class="primary" onclick="addCategory()">+카테고리</button>
<button onclick="toggleManage()">관리모드</button>
<button onclick="toggleDark()">🌙</button>
<button onclick="syncFromGit()">⬇동기화</button>
<button onclick="syncToGit()">⬆업로드</button>
<button onclick="resetToken()">토큰초기화</button>
<button onclick="toggleUI()">기능숨김</button>
</header>

<div class="container">

<div class="card" id="inputCard">
<select id="typeSelect">
<option value="youtube">🎬 유튜브 링크</option>
<option value="link">🌐 일반 링크</option>
<option value="file">📁 파일 업로드</option>
<option value="text">📝 텍스트</option>
</select>

<input id="titleInput" placeholder="제목">
<input id="urlInput" placeholder="URL 입력">
<input type="file" id="fileInput" style="display:none">
<textarea id="textInput" placeholder="텍스트 입력" style="display:none"></textarea>
<button class="primary" onclick="addLink()">저장</button>
</div>

<div class="card">
<div id="categoryBar" class="category-bar"></div>
</div>

<div class="card">
<div id="linkList" class="link-list"></div>
</div>

</div>

<div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:9999;">
<img id="lightboxImg" style="max-width:90%;max-height:90%;border-radius:20px;">
</div>

<div id="textModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:9999;">
<div style="background:white;padding:30px;border-radius:20px;max-width:600px;width:90%;max-height:80%;overflow:auto;">
<h3 id="modalTitle"></h3>
<p id="modalText" style="white-space:pre-wrap;"></p>
<button onclick="closeTextModal()">닫기</button>
</div>
</div>

<script>
const GITHUB={user:"apor76-cmyk",repo:"data",path:"data/linkmanage1.json"};
let data={};
let currentCategory=null;
let manageMode=false;
let linkSortable;
let uiHidden=false;

function toggleUI(){
  uiHidden=!uiHidden;

  const header=document.getElementById("topHeader");
  const input=document.getElementById("inputCard");

  if(uiHidden){
    header.style.display="none";
    input.style.display="none";

    const restoreBtn=document.createElement("button");
    restoreBtn.id="restoreBtn";
    restoreBtn.textContent="기능보기";
    restoreBtn.style.position="fixed";
    restoreBtn.style.top="15px";
    restoreBtn.style.right="20px";
    restoreBtn.style.zIndex="9999";
    restoreBtn.onclick=toggleUI;
    document.body.appendChild(restoreBtn);
  }else{
    header.style.display="flex";
    input.style.display="block";
    const btn=document.getElementById("restoreBtn");
    if(btn)btn.remove();
  }
}

/* 이하 기존 코드 그대로 */

function toggleDark(){document.body.classList.toggle("dark")}
function saveLocal(){localStorage.setItem("ytData",JSON.stringify(data))}
function loadLocal(){const s=localStorage.getItem("ytData");if(s)data=JSON.parse(s);}
function getYoutubeId(url){const m=url.match(/(?:v=|youtu\.be\/)([^&]+)/);return m?m[1]:null;}

typeSelect.onchange=function(){
 urlInput.style.display="none";
 fileInput.style.display="none";
 textInput.style.display="none";
 if(this.value==="youtube"||this.value==="link")urlInput.style.display="inline-block";
 if(this.value==="file")fileInput.style.display="inline-block";
 if(this.value==="text")textInput.style.display="block";
};

function renderCategories(){
 const bar=document.getElementById("categoryBar");
 bar.innerHTML="";
 Object.keys(data).forEach(cat=>{
  const wrap=document.createElement("div");
  const btn=document.createElement("button");
  btn.textContent=cat;
  btn.className="category-btn";
  if(cat===currentCategory)btn.classList.add("active");
  btn.onclick=()=>{currentCategory=cat;renderCategories();renderLinks();}
  wrap.appendChild(btn);

  if(manageMode){
   const edit=document.createElement("button");
   edit.textContent="✏";
   edit.onclick=()=>{
    const n=prompt("새 이름",cat);
    if(n&&!data[n]){data[n]=data[cat];delete data[cat];currentCategory=n;saveLocal();renderCategories();}
   };
   const del=document.createElement("button");
   del.textContent="🗑";
   del.onclick=()=>{
    if(confirm("삭제?")){delete data[cat];currentCategory=null;saveLocal();renderCategories();renderLinks();}
   };
   wrap.appendChild(edit);
   wrap.appendChild(del);
  }
  bar.appendChild(wrap);
 });
}

function addCategory(){
 const n=prompt("카테고리 이름");
 if(n&&!data[n]){data[n]=[];currentCategory=n;saveLocal();renderCategories();}
}

function renderLinks(){
 const box=document.getElementById("linkList");
 box.innerHTML="";
 if(!currentCategory)return;

 data[currentCategory].sort((a,b)=>(b.favorite===true)-(a.favorite===true));

 data[currentCategory].forEach((item,i)=>{
  const card=document.createElement("div");
  card.className="link-card";
  let thumb="";

  if(item.type==="youtube"){
   const id=getYoutubeId(item.url);
   thumb=`<img class="thumb" src="https://img.youtube.com/vi/${id}/mqdefault.jpg">`;
  }
  else if(item.type==="link") thumb=`<div class="thumb">🌐</div>`;
  else if(item.type==="file"){
   if(item.fileName.match(/\.(jpg|jpeg|png|gif)$/i))
    thumb=`<img class="thumb" src="${item.fileData}">`;
   else if(item.fileName.match(/\.xlsx?$/i))
    thumb=`<div class="thumb">📊</div>`;
   else if(item.fileName.match(/\.hwp$/i))
    thumb=`<div class="thumb">📄</div>`;
   else if(item.fileName.match(/\.pdf$/i))
    thumb=`<div class="thumb">📕</div>`;
   else thumb=`<div class="thumb">📁</div>`;
  }
  else if(item.type==="text") thumb=`<div class="thumb">📝</div>`;

  card.innerHTML=`
   ${thumb}
   <div class="link-body">
    <div class="link-title">${item.title}</div>
    <div><span class="star ${item.favorite?'active':''}">★</span></div>
   </div>
  `;

  card.querySelector(".thumb").onclick=()=>{
   if(item.type==="youtube"||item.type==="link")window.open(item.url,"_blank");
   if(item.type==="file"){
    if(item.fileName.match(/\.(jpg|jpeg|png|gif)$/i))openLightbox(item.fileData);
    else{const a=document.createElement("a");a.href=item.fileData;a.download=item.fileName;a.click();}
   }
   if(item.type==="text")openTextModal(item.title,item.text);
  };

  card.querySelector(".star").onclick=(e)=>{
   e.stopPropagation();
   item.favorite=!item.favorite;
   saveLocal();
   renderLinks();
  };

  if(manageMode){
   const actions=document.createElement("div");
   actions.className="manage-actions";

   const edit=document.createElement("button");
   edit.textContent="수정";
   edit.onclick=()=>{
     const newTitle=prompt("제목 수정",item.title);
     if(!newTitle) return;
     item.title=newTitle;

     if(item.type==="youtube" || item.type==="link"){
        const newUrl=prompt("URL 수정",item.url);
        if(newUrl) item.url=newUrl;
     }

     if(item.type==="text"){
        const newText=prompt("내용 수정",item.text);
        if(newText) item.text=newText;
     }

     saveLocal();
     renderLinks();
   };

   const del=document.createElement("button");
   del.textContent="삭제";
   del.onclick=()=>{
     data[currentCategory].splice(i,1);
     saveLocal();
     renderLinks();
   };

   actions.appendChild(edit);
   actions.appendChild(del);
   card.querySelector(".link-body").appendChild(actions);
  }

  box.appendChild(card);
 });

 if(linkSortable)linkSortable.destroy();
 linkSortable=new Sortable(box,{animation:200,ghostClass:"sortable-ghost"});
}

function addLink(){
 if(!currentCategory)return alert("카테고리 선택");
 const type=typeSelect.value;
 const title=titleInput.value;
 if(!title)return alert("제목 입력");

 if(type==="youtube"||type==="link"){
  const url=urlInput.value;
  if(!url)return alert("URL 입력");
  data[currentCategory].push({title,url,type,favorite:false});
 }
 else if(type==="file"){
  const file=fileInput.files[0];
  if(!file)return alert("파일 선택");
  const reader=new FileReader();
  reader.onload=e=>{
   data[currentCategory].push({title,fileData:e.target.result,fileName:file.name,type:"file",favorite:false});
   saveLocal();renderLinks();
  };
  reader.readAsDataURL(file);
  return;
 }
 else if(type==="text"){
  const text=textInput.value;
  if(!text)return alert("내용 입력");
  data[currentCategory].push({title,text,type:"text",favorite:false});
 }

 saveLocal();
 renderLinks();
 titleInput.value="";urlInput.value="";textInput.value="";fileInput.value="";
}

function openLightbox(src){lightboxImg.src=src;lightbox.style.display="flex";}
lightbox.onclick=()=>lightbox.style.display="none";
function openTextModal(t,txt){modalTitle.textContent=t;modalText.textContent=txt;textModal.style.display="flex";}
function closeTextModal(){textModal.style.display="none";}

function toggleManage(){manageMode=!manageMode;renderCategories();renderLinks();}

function getToken(){let t=localStorage.getItem("ghToken");if(!t){t=prompt("GitHub Token");if(t)localStorage.setItem("ghToken",t);}return t;}
function resetToken(){localStorage.removeItem("ghToken");alert("초기화 완료");}

async function syncToGit(){
 const token=getToken();if(!token)return;
 const url=`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${GITHUB.path}`;
 let sha=null;
 const res=await fetch(url,{headers:{Authorization:`token ${token}`}});
 if(res.ok){const f=await res.json();sha=f.sha;}
 await fetch(url,{
  method:"PUT",
  headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
  body:JSON.stringify({
   message:"update data",
   content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),
   sha:sha
  })
 });
 alert("업로드 완료");
}

async function syncFromGit(){
 const token=getToken();if(!token)return;
 const url=`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${GITHUB.path}`;
 const res=await fetch(url,{headers:{Authorization:`token ${token}`}});
 if(!res.ok)return alert("파일 없음");
 const f=await res.json();
 data=JSON.parse(decodeURIComponent(escape(atob(f.content))));
 saveLocal();
 renderCategories();
 renderLinks();
 alert("동기화 완료");
}

loadLocal();
renderCategories();
renderLinks();
</script>

</body>
</html>
