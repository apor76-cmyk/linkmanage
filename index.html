<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Manager Ultimate v16</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<style>
:root{
--bg:#f6f7fb;
--card:#fff;
--text:#111827;
--sub:#6b7280;
--border:#e5e7eb;
--accent:#2563eb;
--star:#f59e0b;
}

.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--sub:#94a3b8;
--border:#334155;
--accent:#3b82f6;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:var(--bg);
color:var(--text);
}

header{
padding:14px;
background:var(--card);
border-bottom:1px solid var(--border);
display:flex;
gap:8px;
flex-wrap:wrap;
}

button{
padding:6px 12px;
border-radius:12px;
border:1px solid var(--border);
background:var(--card);
cursor:pointer;
font-size:13px;
}

.dark button{color:white;}

.primary{
background:var(--accent);
color:white;
border:none;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:20px;
border:1px solid var(--border);
margin-bottom:20px;
}

.category-bar{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.category-btn{
padding:8px 16px;
border-radius:999px;
}

.category-btn.active{
background:var(--accent);
color:white;
border:none;
}

.link-list{
display:grid;
gap:16px;
margin-top:10px;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
}

.link-card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
overflow:hidden;
cursor:pointer;
display:flex;
flex-direction:column;
position:relative;
transition: transform 0.2s;
height:240px;
}

.link-card.favorite{order:-1;}

.thumb{
width:100%;
height:120px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.link-body{
padding:10px;
flex:1;
overflow:hidden;
}

.link-title{
font-size:13px;
font-weight:600;
}

.star{
cursor:pointer;
font-size:18px;
color:var(--sub);
}

.star.active{
color:var(--star);
}

.manage-actions{
display:flex;
gap:6px;
margin-top:6px;
}

textarea{
width:100%;
min-height:120px;
border-radius:10px;
border:1px solid var(--border);
padding:10px;
}

input,select{
padding:8px 10px;
border-radius:10px;
border:1px solid var(--border);
}

#photoModal,#textModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.modalBox{
background:white;
padding:30px;
border-radius:16px;
max-width:700px;
width:90%;
max-height:80%;
overflow:auto;
white-space: pre-wrap;
}
</style>
</head>

<body>

<header id="topbar">
<button class="primary" onclick="addCategory()">+카테고리</button>
<button onclick="toggleManage()">관리모드</button>
<button onclick="toggleHide()">숨김모드</button>
<button onclick="toggleDark()">다크모드</button>
<button onclick="downloadBackup()">백업</button>
<button onclick="restoreBackup()">복원</button>
<button onclick="syncFromGit()">⬇동기화</button>
<button onclick="syncToGit()">⬆업로드</button>
<input id="searchInput" placeholder="검색" oninput="renderLinks()">
</header>

<div class="container">

<div class="card" id="inputBox">
<select id="type">
<option value="youtube">유튜브</option>
<option value="link">링크</option>
<option value="photo">사진</option>
<option value="text">텍스트</option>
</select>
<input id="title" placeholder="제목">
<input id="url" placeholder="URL">
<input type="file" id="file" accept="image/*">
<textarea id="text" rows="6" placeholder="텍스트 입력"></textarea>
<button class="primary" onclick="addLink()">저장</button>
</div>

<div class="card">
<div id="categoryBar" class="category-bar"></div>
</div>

<div class="card">
<h3>⭐ 즐겨찾기</h3>
<div id="favList" class="link-list"></div>
</div>

<div class="card">
<h3>모든 링크</h3>
<div id="linkList" class="link-list"></div>
</div>

</div>

<div id="photoModal" onclick="this.style.display='none'">
<img id="modalImg" style="max-width:90%;max-height:90%">
</div>

<div id="textModal" onclick="this.style.display='none'">
<div class="modalBox">
<h3 id="textTitle"></h3>
<p id="textBody"></p>
</div>
</div>

<script>
const GITHUB={user:"apor76-cmyk",repo:"data",dataPath:"linkmanager.json"}
let data={Home:[]}, currentCategory="Home", manageMode=false, sortable, favSortable

function save(){localStorage.setItem("lmData",JSON.stringify(data))}
function load(){const s=localStorage.getItem("lmData"); if(s){data=JSON.parse(s); currentCategory=Object.keys(data)[0]}}

function toggleDark(){document.body.classList.toggle("dark")}

function toggleHide(){
const bar=document.getElementById("topbar")
const input=document.getElementById("inputBox")
if(bar.style.display==="none"){
bar.style.display="flex"; input.style.display="block"
const btn=document.getElementById("restoreBtn"); if(btn) btn.remove()
}else{
bar.style.display="none"; input.style.display="none"
const btn=document.createElement("button")
btn.id="restoreBtn"; btn.innerText="기능보기"
btn.style.position = "fixed"; btn.style.top = "20px"; btn.style.right = "20px"
btn.onclick=toggleHide
document.body.appendChild(btn)
}
setTimeout(()=>{
if(sortable) sortable.option("disabled", document.getElementById("topbar").style.display==="none")
if(favSortable) favSortable.option("disabled", document.getElementById("topbar").style.display==="none")
},50)
}

function getYoutubeId(url){if(url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0]; if(url.includes("v=")) return url.split("v=")[1].split("&")[0]; return ""}

function addCategory(){const name=prompt("카테고리 이름"); if(!name) return; if(!data[name]){data[name]=[]; currentCategory=name; save(); renderCategories(); renderLinks()}}

function renderCategories(){
const bar=document.getElementById("categoryBar"); bar.innerHTML=""
Object.keys(data).forEach(cat=>{
const wrap=document.createElement("div")
const btn=document.createElement("button")
btn.textContent=cat; btn.className="category-btn"
if(cat===currentCategory) btn.classList.add("active")
btn.onclick=()=>{
currentCategory=cat
renderCategories()
renderLinks()
}
wrap.appendChild(btn)
if(manageMode){
const edit=document.createElement("button"); edit.textContent="✏"; edit.onclick=()=>{
const n=prompt("새 이름",cat); if(n && !data[n]){data[n]=data[cat]; delete data[cat]; currentCategory=n; save(); renderCategories()}
}
const del=document.createElement("button"); del.textContent="🗑"; del.onclick=()=>{if(confirm("삭제?")){delete data[cat]; currentCategory=Object.keys(data)[0]; save(); renderCategories(); renderLinks()}}
wrap.appendChild(edit); wrap.appendChild(del)
}
bar.appendChild(wrap)
})
}

function renderLinks(){
const box=document.getElementById("linkList")
const favBox=document.getElementById("favList")
box.innerHTML=""; favBox.innerHTML=""
let list=[...data[currentCategory]]
const search=document.getElementById("searchInput").value.toLowerCase()
list=list.filter(i=>i.title.toLowerCase().includes(search))
list.forEach(item=>{
const card=document.createElement("div")
card.className="link-card"
if(item.favorite) card.classList.add("favorite")
let thumb=""
if(item.type==="youtube"){const id=getYoutubeId(item.url); thumb=`<div class="thumb"><img src="https://img.youtube.com/vi/${id}/mqdefault.jpg"></div>`}
else if(item.type==="link"){let icon="🌐"; try{const domain=new URL(item.url).hostname; icon=`<img src="https://www.google.com/s2/favicons?sz=64&domain=${domain}">`}catch{}; thumb=`<div class="thumb">${icon}</div>`}
else if(item.type==="photo"){thumb=`<div class="thumb"><img src="${item.url}" onclick="showModal('${item.url}')"></div>`}
else if(item.type==="text"){
const preview=item.text ? (item.text.length>150 ? item.text.slice(0,150)+"..." : item.text) : ""
thumb=`<div class="thumb" style="
    display:flex;
    align-items:center;
    justify-content:flex-start;
    padding:8px;
    text-align:left;
    background:#f0f0f0;
    font-size:12px;
    color:#333;
    overflow:hidden;
    white-space: pre-wrap;
    word-wrap: break-word;
    ">
    ${preview}
</div>`
}
card.innerHTML=`
${thumb}
<div class="link-body">
<div class="link-title">${item.title}</div>
<div><span class="star ${item.favorite?'active':''}">★</span></div>
</div>`
card.onclick=()=>{
if(item.type==="link"||item.type==="youtube") window.open(item.url,"_blank")
if(item.type==="text"){
const textModal=document.getElementById("textModal")
document.getElementById("textTitle").innerText=item.title
document.getElementById("textBody").innerText=item.text
// 다크모드에 따라 배경/글자색 적용
if(document.body.classList.contains("dark")){
textModal.querySelector(".modalBox").style.background="#1e293b"
textModal.querySelector(".modalBox").style.color="#f1f5f9"
}else{
textModal.querySelector(".modalBox").style.background="#fff"
textModal.querySelector(".modalBox").style.color="#111"
}
textModal.style.display="flex"
}
}
card.querySelector(".star").onclick=e=>{e.stopPropagation(); item.favorite=!item.favorite; save(); renderLinks()}
if(manageMode){
const actions=document.createElement("div"); actions.className="manage-actions"
const edit=document.createElement("button"); edit.textContent="✏"; edit.onclick=e=>{
e.stopPropagation()
const t=prompt("제목",item.title); if(t) item.title=t
if(item.type==="link"||item.type==="youtube"){const u=prompt("URL",item.url); if(u) item.url=u}
if(item.type==="text"){
    const modal=document.createElement("div")
    modal.style.position="fixed"; modal.style.top="0"; modal.style.left="0"; modal.style.width="100%"; modal.style.height="100%"
    modal.style.background="rgba(0,0,0,0.8)"; modal.style.display="flex"; modal.style.justifyContent="center"; modal.style.alignItems="center"; modal.style.zIndex="9999"
    const box=document.createElement("div")
    if(document.body.classList.contains("dark")){box.style.background="#1e293b"; box.style.color="#f1f5f9"}
    else{box.style.background="#fff"; box.style.color="#111"}
    box.style.padding="20px"; box.style.borderRadius="16px"; box.style.width="80%"; box.style.maxWidth="600px"; box.style.display="flex"; box.style.flexDirection="column"
    const ta=document.createElement("textarea"); ta.style.width="100%"; ta.style.height="200px"; ta.style.resize="vertical"; ta.style.background="inherit"; ta.style.color="inherit"; ta.value=item.text||""; box.appendChild(ta)
    const saveBtn=document.createElement("button"); saveBtn.textContent="저장"; saveBtn.className="primary"; saveBtn.style.marginTop="10px"
    saveBtn.onclick=()=>{item.text=ta.value; save(); renderLinks(); document.body.removeChild(modal)}
    box.appendChild(saveBtn); modal.appendChild(box); document.body.appendChild(modal)
}
save(); renderLinks()
}
const del=document.createElement("button"); del.textContent="🗑"; del.onclick=e=>{e.stopPropagation(); if(confirm("삭제?")){data[currentCategory]=data[currentCategory].filter(d=>d.id!==item.id); save(); renderLinks()}}
actions.appendChild(edit); actions.appendChild(del); card.appendChild(actions)
}
if(item.favorite) favBox.appendChild(card)
else box.appendChild(card)
})
if(sortable) sortable.destroy()
if(favSortable) favSortable.destroy()
sortable=new Sortable(box,{animation:200,disabled: document.getElementById("topbar").style.display==="none"})
favSortable=new Sortable(favBox,{animation:200,disabled: document.getElementById("topbar").style.display==="none"})
}

function showModal(src){document.getElementById("modalImg").src=src; document.getElementById("photoModal").style.display="flex"}
async function compressImage(file){return new Promise(resolve=>{const img=new Image(); const reader=new FileReader(); reader.onload=e=>{img.src=e.target.result; img.onload=()=>{const canvas=document.createElement("canvas"); const ctx=canvas.getContext("2d"); const max=1600; let w=img.width; let h=img.height; if(w>max){h*=max/w; w=max} canvas.width=w; canvas.height=h; ctx.drawImage(img,0,0,w,h); resolve(canvas.toDataURL("image/jpeg",0.75))}}; reader.readAsDataURL(file)})}
async function addLink(){
const type=document.getElementById("type").value
const title=document.getElementById("title").value
const url=document.getElementById("url").value
const text=document.getElementById("text").value
const file=document.getElementById("file").files[0]
if(!title) return alert("제목 입력")
if(type==="photo" && file){const img=await compressImage(file); data[currentCategory].push({id:Date.now(),title,type,url:img,favorite:false})}else{data[currentCategory].push({id:Date.now(),title,url,text,type,favorite:false})}
save(); renderLinks()
document.getElementById("title").value=""; document.getElementById("url").value=""; document.getElementById("text").value=""; document.getElementById("file").value=""
}

function toggleManage(){manageMode=!manageMode; renderCategories(); renderLinks()}
function downloadBackup(){const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="linkmanager_backup.json"; a.click()}
function restoreBackup(){const input=document.createElement("input"); input.type="file"; input.onchange=e=>{const reader=new FileReader(); reader.onload=x=>{data=JSON.parse(x.target.result); save(); renderCategories(); renderLinks()}; reader.readAsText(e.target.files[0])}; input.click()}
function getToken(){let t=localStorage.getItem("ghToken"); if(!t){t=prompt("GitHub Token"); if(t) localStorage.setItem("ghToken",t)}; return t}
async function syncToGit(){const token=getToken(); if(!token) return
const url=`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${GITHUB.dataPath}`
let sha=null
const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}})
if(r.ok){const f=await r.json(); sha=f.sha}
await fetch(url,{method:"PUT",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({message:"update data",content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),sha})})
alert("업로드 완료")}

async function syncFromGit(){const token=getToken(); if(!token) return
const url=`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${GITHUB.dataPath}`
const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}})
if(!r.ok) return alert("파일 없음")
const f=await r.json()
data=JSON.parse(decodeURIComponent(escape(atob(f.content))))
save(); renderCategories(); renderLinks(); alert("동기화 완료")}

load(); renderCategories(); renderLinks()
</script>

</body>
</html>
