<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Link Manager</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<style>
:root{
 --bg:#f6f7fb;
 --card:#ffffff;
 --text:#111827;
 --sub:#6b7280;
 --border:#e5e7eb;
 --accent:#2563eb;
 --hover:#1d4ed8;
 --star:#f59e0b;
}
.dark{
 --bg:#0f172a;
 --card:#1e293b;
 --text:#f1f5f9;
 --sub:#94a3b8;
 --border:#334155;
 --accent:#3b82f6;
 --hover:#60a5fa;
}
body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
 background:var(--bg);
 color:var(--text);
}
header{
 padding:16px;
 background:var(--card);
 border-bottom:1px solid var(--border);
 display:flex;
 gap:10px;
 flex-wrap:wrap;
}
button{
 padding:6px 12px;
 border-radius:12px;
 border:1px solid var(--border);
 background:var(--card);
 color:var(--text);
 cursor:pointer;
 font-size:13px;
}
.primary{
 background:var(--accent);
 color:#fff;
 border:none;
}
.container{
 max-width:1400px;
 margin:auto;
 padding:30px 20px;
}
.card{
 background:var(--card);
 padding:20px;
 border-radius:20px;
 border:1px solid var(--border);
 margin-bottom:25px;
}
.category-bar{
 display:flex;
 flex-wrap:wrap;
 gap:12px;
}
.category-btn{
 padding:8px 16px;
 border-radius:999px;
 cursor:pointer;
}
.category-btn.active{
 background:var(--accent);
 color:white;
 border:none;
}

/* 반응형 */
.link-list{
 display:grid;
 gap:16px;
 margin-top:10px;
 grid-template-columns:repeat(3,1fr);
}
@media (min-width:768px){
 .link-list{ grid-template-columns:repeat(4,1fr); }
}
@media (min-width:1200px){
 .link-list{ grid-template-columns:repeat(6,1fr); }
}

.link-card{
 background:var(--card);
 border:1px solid var(--border);
 border-radius:18px;
 overflow:hidden;
 display:flex;
 flex-direction:column;
 cursor:grab;
 transition:.25s;
}
.link-card:hover{
 transform:translateY(-6px);
 box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
.thumb{
 width:100%;
 aspect-ratio:16/9;
 object-fit:cover;
}
.link-body{
 padding:12px;
 display:flex;
 flex-direction:column;
 gap:6px;
}
.link-title{
 font-size:13px;
 font-weight:600;
}
.star{
 cursor:pointer;
 font-size:18px;
 color:var(--sub);
}
.star.active{ color:var(--star); }

.manage-actions{
 display:flex;
 gap:6px;
 margin-top:6px;
}

.sortable-ghost{opacity:.4;}
.sortable-chosen{transform:scale(1.03);}

input{
 padding:10px 14px;
 border-radius:14px;
 border:1px solid var(--border);
 background:var(--card);
 color:var(--text);
 margin-right:8px;
}
</style>
</head>

<body>

<header>
<button class="primary" onclick="addCategory()">+카테고리</button>
<button onclick="toggleManage()">관리모드</button>
<button onclick="toggleDark()">🌙</button>
<button onclick="syncFromGit()">⬇동기화</button>
<button onclick="syncToGit()">⬆업로드</button>
<button onclick="resetToken()">토큰초기화</button>
</header>

<div class="container">

<div class="card">
<div id="categoryBar" class="category-bar"></div>
</div>

<div class="card">
<input id="titleInput" placeholder="제목">
<input id="urlInput" placeholder="유튜브 URL">
<button class="primary" onclick="addLink()">저장</button>
</div>

<div class="card">
<div id="linkList" class="link-list"></div>
</div>

</div>

<script>
const GITHUB={
 user:"apor76-cmyk",
 repo:"data",
 path:"data/linkmanage.json"
};

let data={};
let currentCategory=null;
let manageMode=false;
let linkSortable;

function toggleDark(){document.body.classList.toggle("dark")}
function saveLocal(){localStorage.setItem("ytData",JSON.stringify(data))}
function loadLocal(){
 const saved=localStorage.getItem("ytData");
 if(saved) data=JSON.parse(saved);
}

function getYoutubeId(url){
 const match=url.match(/(?:v=|youtu\.be\/)([^&]+)/);
 return match?match[1]:null;
}

/* ---------- 카테고리 ---------- */
function renderCategories(){
 const bar=document.getElementById("categoryBar");
 bar.innerHTML="";
 Object.keys(data).forEach(cat=>{
   const wrap=document.createElement("div");

   const btn=document.createElement("button");
   btn.textContent=cat;
   btn.className="category-btn";
   if(cat===currentCategory) btn.classList.add("active");
   btn.onclick=()=>{currentCategory=cat;renderCategories();renderLinks();}
   wrap.appendChild(btn);

   if(manageMode){
     const edit=document.createElement("button");
     edit.textContent="✏";
     edit.onclick=()=>{
       const newName=prompt("새 이름",cat);
       if(newName && !data[newName]){
         data[newName]=data[cat];
         delete data[cat];
         currentCategory=newName;
         saveLocal();
         renderCategories();
       }
     };
     const del=document.createElement("button");
     del.textContent="🗑";
     del.onclick=()=>{
       if(confirm("카테고리 삭제?")){
         delete data[cat];
         currentCategory=null;
         saveLocal();
         renderCategories();
         renderLinks();
       }
     };
     wrap.appendChild(edit);
     wrap.appendChild(del);
   }

   bar.appendChild(wrap);
 });
}

/* ---------- 링크 ---------- */
function renderLinks(){
 const box=document.getElementById("linkList");
 box.innerHTML="";
 if(!currentCategory) return;

 // ⭐ 항상 favorite 상단 고정
 data[currentCategory].sort((a,b)=>
   (b.favorite===true)-(a.favorite===true)
 );

 data[currentCategory].forEach((item,i)=>{
   const id=getYoutubeId(item.url);
   const card=document.createElement("div");
   card.className="link-card";

   card.innerHTML=`
     <img class="thumb" src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
     <div class="link-body">
       <div class="link-title">${item.title}</div>
       <div><span class="star ${item.favorite?'active':''}">★</span></div>
     </div>
   `;

   card.querySelector(".thumb").onclick=()=>window.open(item.url,"_blank");

   card.querySelector(".star").onclick=(e)=>{
     e.stopPropagation();
     item.favorite=!item.favorite;
     saveLocal();
     renderLinks();
   };

   if(manageMode){
     const actions=document.createElement("div");
     actions.className="manage-actions";

     const edit=document.createElement("button");
     edit.textContent="수정";
     edit.onclick=()=>{
       const t=prompt("제목",item.title);
       const u=prompt("URL",item.url);
       if(t&&u){ item.title=t; item.url=u; saveLocal(); renderLinks(); }
     };

     const del=document.createElement("button");
     del.textContent="삭제";
     del.onclick=()=>{
       data[currentCategory].splice(i,1);
       saveLocal();
       renderLinks();
     };

     actions.appendChild(edit);
     actions.appendChild(del);
     card.querySelector(".link-body").appendChild(actions);
   }

   box.appendChild(card);
 });

 if(linkSortable) linkSortable.destroy();

 linkSortable=new Sortable(box,{
   animation:200,
   ghostClass:"sortable-ghost",
   onEnd:(evt)=>{
     const items=[...box.children];
     const favCount=data[currentCategory].filter(v=>v.favorite).length;
     const newOrder=[];
     items.forEach((el,index)=>{
       const title=el.querySelector(".link-title").textContent;
       const found=data[currentCategory].find(v=>v.title===title);
       found.favorite = index < favCount;
       newOrder.push(found);
     });
     data[currentCategory]=newOrder;
     saveLocal();
     renderLinks();
   }
 });
}

/* ---------- 기타 ---------- */
function toggleManage(){ manageMode=!manageMode; renderCategories(); renderLinks(); }
function addCategory(){
 const name=prompt("카테고리 이름");
 if(name && !data[name]){
   data[name]=[];
   currentCategory=name;
   saveLocal();
   renderCategories();
 }
}
function addLink(){
 if(!currentCategory) return alert("카테고리 선택");
 const t=titleInput.value;
 const u=urlInput.value;
 if(t&&u){
   data[currentCategory].push({title:t,url:u,favorite:false});
   saveLocal();
   renderLinks();
   titleInput.value="";
   urlInput.value="";
 }
}

/* ---------- GitHub ---------- */
function getToken(){
 let token=localStorage.getItem("ghToken");
 if(!token){
   token=prompt("GitHub Token 입력");
   if(token) localStorage.setItem("ghToken",token);
 }
 return token;
}
function resetToken(){ localStorage.removeItem("ghToken"); alert("토큰 초기화 완료"); }

async function syncToGit(){
 const token=getToken(); if(!token) return;
 const url=`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${GITHUB.path}`;
 let sha=null;
 const res=await fetch(url,{headers:{Authorization:`token ${token}`}});
 if(res.ok){const file=await res.json();sha=file.sha;}
 await fetch(url,{
   method:"PUT",
   headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
   body:JSON.stringify({
     message:"update link data",
     content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),
     sha:sha
   })
 });
 alert("업로드 완료");
}

async function syncFromGit(){
 const token=getToken(); if(!token) return;
 const url=`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${GITHUB.path}`;
 const res=await fetch(url,{headers:{Authorization:`token ${token}`}});
 if(!res.ok) return alert("파일 없음");
 const file=await res.json();
 data=JSON.parse(decodeURIComponent(escape(atob(file.content))));
 saveLocal();
 renderCategories();
 renderLinks();
 alert("동기화 완료");
}

loadLocal();
renderCategories();
</script>
</body>
</html>
