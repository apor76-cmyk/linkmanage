<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Link Manager</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<style>
:root{
 --bg:#f6f7fb;
 --card:#ffffff;
 --text:#111827;
 --sub:#6b7280;
 --border:#e5e7eb;
 --accent:#2563eb;
 --star:#f59e0b;
}

.dark{
 --bg:#0f172a;
 --card:#1e293b;
 --text:#f1f5f9;
 --sub:#94a3b8;
 --border:#334155;
 --accent:#3b82f6;
}

body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
 background:var(--bg);
 color:var(--text);
}

header{
 padding:14px;
 background:var(--card);
 border-bottom:1px solid var(--border);
 display:flex;
 gap:8px;
 flex-wrap:wrap;
}

button{
 padding:6px 12px;
 border-radius:12px;
 border:1px solid var(--border);
 background:var(--card);
 color:var(--text);
 cursor:pointer;
 font-size:13px;
}

.primary{
 background:var(--accent);
 color:#fff;
 border:none;
}

.container{
 max-width:1100px;
 margin:auto;
 padding:25px 20px;
}

.card{
 background:var(--card);
 padding:20px;
 border-radius:18px;
 border:1px solid var(--border);
 margin-bottom:20px;
}

.link-list{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
 gap:20px;
}

@media (max-width:600px){
 .link-list{
   grid-template-columns:repeat(2,1fr);
   gap:14px;
 }
 .thumb{
   height:100px;
 }
}

.link-card{
 background:var(--card);
 border:1px solid var(--border);
 border-radius:16px;
 overflow:hidden;
 cursor:grab;
}

.thumb{
 width:100%;
 height:120px;
 object-fit:cover;
}

.link-body{
 padding:10px;
}

.link-title{
 font-size:14px;
 font-weight:600;
 margin-bottom:6px;
}

.star{
 cursor:pointer;
 font-size:16px;
 color:var(--sub);
}

.star.active{
 color:var(--star);
}

.category-bar{
 display:flex;
 flex-wrap:wrap;
 gap:10px;
}

.category-btn{
 padding:8px 16px;
 border-radius:999px;
 cursor:pointer;
}

.category-btn.active{
 background:var(--accent);
 color:white;
 border:none;
}

.sortable-ghost{opacity:.4;}

input{
 padding:8px 12px;
 border-radius:12px;
 border:1px solid var(--border);
 margin-right:8px;
}
</style>
</head>

<body>

<header>
<button class="primary" onclick="addCategory()">+카테고리</button>
<button onclick="toggleDark()">🌙</button>
<button onclick="syncFromGit()">⬇동기화</button>
<button onclick="syncToGit()">⬆업로드</button>
<button onclick="resetToken()">토큰초기화</button>
</header>

<div class="container">

<div class="card">
<h3>카테고리</h3>
<div id="categoryBar" class="category-bar"></div>
</div>

<div class="card">
<h3>유튜브 링크 추가</h3>
<input id="titleInput" placeholder="제목">
<input id="urlInput" placeholder="유튜브 URL">
<button class="primary" onclick="addLink()">저장</button>
</div>

<div class="card">
<h3>링크 목록</h3>
<div id="linkList" class="link-list"></div>
</div>

</div>

<script>
const GITHUB={
 user:"apor76-cmyk",
 repo:"data",
 path:"data/lingmanage.json"
};

let data={};
let currentCategory=null;

function save(){localStorage.setItem("ytData",JSON.stringify(data))}
function load(){
 const s=localStorage.getItem("ytData");
 if(s) data=JSON.parse(s);
}

function toggleDark(){document.body.classList.toggle("dark")}

function addCategory(){
 const name=prompt("카테고리 이름");
 if(!name) return;
 if(data[name]) return alert("이미 존재");
 data[name]=[];
 currentCategory=name;
 save();
 renderCategories();
 renderLinks();
}

function renderCategories(){
 const bar=document.getElementById("categoryBar");
 bar.innerHTML="";
 Object.keys(data).forEach(cat=>{
   const btn=document.createElement("button");
   btn.textContent=cat;
   btn.className="category-btn";
   if(cat===currentCategory) btn.classList.add("active");
   btn.onclick=()=>{currentCategory=cat;renderCategories();renderLinks();}
   bar.appendChild(btn);
 });
}

function getId(url){
 const m=url.match(/(?:v=|youtu\.be\/)([^&]+)/);
 return m?m[1]:"";
}

function addLink(){
 if(!currentCategory) return alert("카테고리 선택");
 const t=titleInput.value.trim();
 const u=urlInput.value.trim();
 if(!t||!u) return;
 data[currentCategory].push({title:t,url:u,favorite:false});
 save();
 titleInput.value="";
 urlInput.value="";
 renderLinks();
}

function renderLinks(){
 const box=document.getElementById("linkList");
 box.innerHTML="";
 if(!currentCategory) return;

 const sorted=[...data[currentCategory]].sort((a,b)=>b.favorite-a.favorite);

 sorted.forEach((item)=>{
   const id=getId(item.url);
   const card=document.createElement("div");
   card.className="link-card";
   card.innerHTML=`
     <img class="thumb" src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
     <div class="link-body">
       <div class="link-title">${item.title}</div>
       <div><span class="star ${item.favorite?'active':''}">★</span></div>
     </div>
   `;
   card.querySelector(".thumb").onclick=()=>window.open(item.url);
   card.querySelector(".star").onclick=(e)=>{
     e.stopPropagation();
     item.favorite=!item.favorite;
     save();
     renderLinks();
   };
   box.appendChild(card);
 });

 new Sortable(box,{
   animation:150,
   ghostClass:"sortable-ghost",
   onEnd:(evt)=>{
     const real=data[currentCategory];
     const moved=real.splice(evt.oldIndex,1)[0];
     real.splice(evt.newIndex,0,moved);
     save();
     renderLinks();
   }
 });
}

/* GitHub */
function getToken(){
 let token=localStorage.getItem("ghToken");
 if(!token){
   token=prompt("GitHub Token 입력");
   if(token) localStorage.setItem("ghToken",token);
 }
 return token;
}

function resetToken(){
 localStorage.removeItem("ghToken");
 alert("토큰 초기화 완료");
}

async function syncToGit(){
 const token=getToken();
 if(!token) return;
 const url=`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${GITHUB.path}`;
 let sha=null;
 const res=await fetch(url,{headers:{Authorization:`token ${token}`}});
 if(res.ok){const file=await res.json();sha=file.sha;}
 await fetch(url,{
   method:"PUT",
   headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
   body:JSON.stringify({
     message:"update link data",
     content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),
     sha:sha
   })
 });
 alert("업로드 완료");
}

async function syncFromGit(){
 const token=getToken();
 if(!token) return;
 const url=`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${GITHUB.path}`;
 const res=await fetch(url,{headers:{Authorization:`token ${token}`}});
 if(!res.ok) return alert("파일 없음");
 const file=await res.json();
 data=JSON.parse(decodeURIComponent(escape(atob(file.content))));
 save();
 renderCategories();
 renderLinks();
 alert("동기화 완료");
}

load();
renderCategories();
</script>

</body>
</html>
